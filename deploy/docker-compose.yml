version: '3.8'

services:
  pdf-toolbox:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
